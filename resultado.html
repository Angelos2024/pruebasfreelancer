<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>resultado.html</title>
  <link rel="stylesheet" href="assets/css/master.css">
</head>
<body>
  <div class="app">
    
 <header class="nav">
      <div class="nav_logo"><img src="assets/img/logo.svg" alt="Logo"></div>
      <a class="nav_lang" href="#"><img src="assets/img/uk.png" alt="Lang"></a>
    </header>

    <section class="header result-header">
      <h1><span>Producto encontrado</span><br>Consulta en tiempo real desde OpenFoodFacts.</h1>
      <div class="instructions">
        <button class="aptd-btn-install" id="status-banner" type="button">
          <strong>Esperando búsqueda</strong>
          <small>Ingresa un código desde la pantalla anterior</small>
        </button>
      </div>
    </section>

    <section class="page-block">
      <div class="card">
        <div class="result-photo result-photo-image" id="product-image">📦</div>
        <div class="result-meta" id="result-badges"></div>
        <h2 class="result-name" id="product-name">Sin datos todavía</h2>
        <p class="text" id="product-summary">Esta vista mostrará solo los campos solicitados al endpoint de OpenFoodFacts.</p>
        <div class="stack" style="margin-top:12px">
          <a class="btn btn-primary" href="inicio.html">Buscar otro producto</a>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title" style="margin-top:0;text-align:left">Detalle del producto</h2>
        <div class="details-list" id="product-details"></div>
      </div>
    </section>
  </div>

  <script>
    const statusBanner = document.getElementById('status-banner');
    const productImage = document.getElementById('product-image');
    const resultBadges = document.getElementById('result-badges');
    const productName = document.getElementById('product-name');
    const productSummary = document.getElementById('product-summary');
    const productDetails = document.getElementById('product-details');

    const params = new URLSearchParams(window.location.search);
    const barcode = (params.get('barcode') || '').replace(/\D/g, '');

    function setStatus(title, subtitle) {
      statusBanner.innerHTML = `<strong>${title}</strong><small>${subtitle}</small>`;
    }

    function renderBadges(product, code) {
      const badges = [
        code ? `<span class="badge">${code}</span>` : '',
        product.brands ? `<span class="badge">${product.brands}</span>` : '',
        product.countries ? `<span class="badge">${product.countries}</span>` : '',
        product.nutriscore_grade ? `<span class="badge ok">Nutri-Score ${product.nutriscore_grade.toUpperCase()}</span>` : ''
      ].filter(Boolean);

      resultBadges.innerHTML = badges.join('');
    }

    function renderDetails(product, code) {
      const detailRows = [
        ['Código de barras', code || 'No disponible'],
        ['Nombre genérico', product.generic_name || 'No disponible'],
        ['Cantidad', product.quantity || 'No disponible'],
        ['Categorías', product.categories || 'No disponible'],
        ['Ingredientes', product.ingredients_text_es || product.ingredients_text || 'No disponible'],
        ['NOVA', product.nova_group || 'No disponible'],
        ['Eco-Score', product.ecoscore_grade ? product.ecoscore_grade.toUpperCase() : 'No disponible']
      ];

      productDetails.innerHTML = detailRows.map(([label, value]) => `
        <div class="detail-row">
          <strong>${label}</strong>
          <span>${value}</span>
        </div>
      `).join('');
    }

    function renderProduct(payload) {
      const product = payload.product || {};
      const code = payload.code || barcode;
      const imageUrl = product.image_front_url || product.image_url;

      setStatus(payload.status_verbose || 'Producto encontrado', 'Datos filtrados desde la API oficial');
      productName.textContent = product.product_name || 'Producto sin nombre registrado';
      productSummary.textContent = product.ingredients_text_es || product.ingredients_text || 'OpenFoodFacts no devolvió una descripción de ingredientes para este producto.';
      renderBadges(product, code);
      renderDetails(product, code);

      if (imageUrl) {
        productImage.innerHTML = `<img src="${imageUrl}" alt="${product.product_name || 'Producto'}">`;
      } else {
        productImage.textContent = '📦';
      }
    }

    function renderError(message) {
      setStatus('No se pudo completar la búsqueda', message);
      productName.textContent = 'Sin resultado';
      productSummary.textContent = message;
      resultBadges.innerHTML = '';
      productDetails.innerHTML = '';
      productImage.textContent = '⚠️';
    }

    async function loadProduct() {
      if (!barcode) {
        renderError('Falta el código de barras en la URL.');
        return;
      }

      setStatus('Consultando OpenFoodFacts', `Código ${barcode}`);

      try {
        const response = await fetch(`/api/product/${barcode}`);
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || 'Error al consultar el producto.');
        }

        if (!payload.product) {
          throw new Error('OpenFoodFacts no devolvió datos de producto para ese código.');
        }

        renderProduct(payload);
      } catch (error) {
        renderError(error.message);
      }
    }

    loadProduct();
  </script>
</body>
</html>

  </div>
</body>
</html>
