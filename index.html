<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario Caraita Astronomico</title>

  <script src="https://cdn.jsdelivr.net/gh/cosinekitty/astronomy@v2.1.18/demo/browser/astronomy.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

  <style>
    :root {
      --bg:#f0ede4; --panel:#fff; --border:#c8b78a; --strong:#9f8750;
      --head:#7a3a0a; --text:#1d1d1d; --muted:#666; --accent:#7a5c1e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}

    /* HEADER */
    .app-header{background:var(--head);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;}
    .app-header h1{font-size:1.2rem;font-weight:700;}
    .app-header small{font-size:.78rem;opacity:.75;}

    /* CONTROLES */
    .ctrl-wrap{background:#fff;border-bottom:2px solid var(--strong);padding:14px 22px;}
    .ctrl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;align-items:end;}
    .field label{display:block;font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:4px;}
    .field input,.field select{
      width:100%;padding:7px 9px;font:inherit;font-size:.85rem;
      border:1px solid var(--border);border-radius:5px;background:#fffdf8;
    }
    .btn-calc{
      background:var(--head);color:#fff;border:none;border-radius:5px;
      padding:9px 18px;font:inherit;font-size:.9rem;font-weight:700;
      cursor:pointer;width:100%;transition:opacity .15s;
    }
    .btn-calc:hover{opacity:.88;}
    .btn-calc:disabled{opacity:.55;cursor:default;}

    /* STATUS */
    #statusBox{margin:10px 22px 0;padding:9px 14px;border-radius:5px;font-size:.86rem;display:none;}
    #statusBox.ok   {display:block;background:#f0faf3;border:1px solid #68d391;color:#276749;}
    #statusBox.warn {display:block;background:#fffbeb;border:1px solid #f6ad55;color:#7b341e;}
    #statusBox.error{display:block;background:#fff5f5;border:1px solid #fc8181;color:#9b2c2c;}

    /* PLACEHOLDER */
    #placeholder{text-align:center;padding:70px 20px;color:var(--muted);}
    #placeholder .ico{font-size:3rem;margin-bottom:14px;}

    /* OUTPUT */
    #calOutput{padding:18px 22px;display:none;}

    /* LEYENDA */
    .legend{
      display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;
      padding:11px 14px;background:#fff;
      border:1px solid var(--border);border-radius:5px;
    }
    .lg-item{display:flex;align-items:center;gap:5px;font-size:.75rem;}
    .lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

    /* MESES GRID */
    .months-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}

    /* CALENDARIO MENSUAL */
    .cal-month{background:#fff;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
    .cal-month-title{
      background:var(--head);color:#fff;padding:11px 16px;
      font-weight:700;font-size:1.05rem;letter-spacing:.03em;
    }
    /* ── tabla del calendario mensual ── */
    .cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
    .cal-table th{
      text-align:center;padding:7px 2px;font-size:.78rem;font-weight:700;
      color:var(--muted);background:#f7f3ea;border-bottom:1px solid var(--border);
    }
    .cal-table th.sat{color:#2563eb;} .cal-table th.sun{color:#c53030;}
    .cal-table td{
      width:14.285%;border:1px solid #ece8df;
      height:90px;vertical-align:top;padding:6px 5px 5px 7px;
    }
    .cal-table td.empty{background:#faf8f4;}
    .cal-table td.sat-c .dn{color:#2563eb;}
    .cal-table td.sun-c .dn{color:#c53030;}
    .dn{font-size:.9rem;font-weight:700;color:#444;margin-bottom:4px;}
    .ev{
      display:block;font-size:.72rem;font-weight:600;color:#fff;
      border-radius:3px;padding:2px 6px;margin-bottom:3px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6;
    }

    /* Celdas clickeables */
    .cal-table td:not(.empty){cursor:pointer;transition:background .12s;}
    .cal-table td:not(.empty):hover{background:#f0ebff !important;}

    /* Modal overlay */
    .modal-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
      z-index:9999;align-items:center;justify-content:center;padding:16px;
    }
    .modal-box{
      background:#fff;border-radius:10px;width:100%;max-width:460px;
      box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden;
    }
    .modal-header{
      background:var(--head);color:#fff;padding:14px 18px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .modal-header-title{font-weight:700;font-size:1rem;line-height:1.3;}
    .modal-header-sub{font-size:.78rem;opacity:.8;margin-top:2px;}
    .modal-close{
      background:rgba(255,255,255,.2);border:none;color:#fff;
      width:28px;height:28px;border-radius:50%;cursor:pointer;
      font-size:1rem;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:background .15s;
    }
    .modal-close:hover{background:rgba(255,255,255,.35);}
    .modal-events{
      padding:10px 18px;display:flex;flex-wrap:wrap;gap:6px;
      border-bottom:1px solid #ece8df;min-height:36px;align-items:center;
    }
    .modal-ev{
      display:inline-block;padding:3px 10px;border-radius:12px;
      color:#fff;font-size:.78rem;font-weight:600;
    }
    .modal-body{padding:18px 18px 14px;}
    .modal-time-row{
      display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;
    }
    .modal-icon{font-size:1.6rem;flex-shrink:0;line-height:1;}
    .modal-lbl{font-size:.72rem;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
    .modal-time{font-size:1.05rem;font-weight:700;color:var(--text);}
    .modal-phase-bar{
      background:#f7f3ea;border-radius:8px;padding:12px 14px;margin-top:4px;
      display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;
    }
    .phase-emoji{font-size:2rem;text-align:center;}
    .phase-info .phase-name{font-weight:700;font-size:.95rem;color:var(--accent);}
    .phase-info .phase-detail{font-size:.78rem;color:#666;margin-top:3px;}
    .modal-duration{
      text-align:center;background:#e8f5e9;border-radius:6px;
      padding:8px;font-size:.88rem;color:#276749;font-weight:700;margin-top:10px;
    }
    .modal-loading{padding:24px;text-align:center;color:#888;font-size:.9rem;}

    @media(max-width:900px){
      .months-grid{grid-template-columns:1fr;}
    }
    @media(max-width:600px){
      .ctrl-grid{grid-template-columns:1fr 1fr;}
      #calOutput,#placeholder,.ctrl-wrap{padding-left:12px;padding-right:12px;}
    }
  </style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>&#128197; Calendario Caraita Astronomico</h1>
    <small>Astronomy Engine &bull; SunCalc &bull; Luxon</small>
  </div>
</header>

<div class="ctrl-wrap">
  <div class="ctrl-grid">
    <div class="field"><label>Ano</label>
      <input id="yearName" type="text" value="2026"/></div>
    <div class="field"><label>Zona horaria</label>
      <input id="timezone" type="text" value="Asia/Jerusalem"/></div>
    <div class="field"><label>Latitud</label>
      <input id="latitude" type="number" step="0.000001" value="31.768300"/></div>
    <div class="field"><label>Longitud</label>
      <input id="longitude" type="number" step="0.000001" value="35.213700"/></div>
    <div class="field"><label>Elevacion (m)</label>
      <input id="elevation" type="number" value="800"/></div>
    <div class="field"><label>Buscar desde</label>
      <input id="searchStart" type="datetime-local" value="2026-03-01T12:00"/></div>
    <div class="field"><label>Visibilidad</label>
      <select id="crescentMode">
        <option value="strict">Estricto</option>
        <option value="standard" selected>Estandar</option>
        <option value="lenient">Flexible</option>
      </select></div>
    <div class="field"><label>Ancla Yom Teruah</label>
      <input id="fallbackMonth7" type="datetime-local" value="2026-09-12T19:00"/></div>
    <div class="field"><label>Uso ancla mes 7</label>
      <select id="useFallbackMonth7">
        <option value="compare" selected>Solo comparar</option>
        <option value="force">Forzar mes 7</option>
      </select></div>
    <div class="field"><label>Meses</label>
      <select id="monthCount">
        <option value="12" selected>12 meses</option>
        <option value="13">13 meses</option>
      </select></div>
    <div class="field" style="align-self:end">
      <label>&nbsp;</label>
      <button class="btn-calc" id="recalcBtn">Calcular calendario</button>
    </div>
  </div>
</div>

<div id="statusBox"></div>

<div id="placeholder">
  <div class="ico">&#127769;</div>
  <p>Configura los parametros y presiona <b>Calcular calendario</b>.</p>
</div>

<div id="calOutput">
  <div class="legend" id="legend"></div>
  <div class="months-grid" id="monthsGrid"></div>
</div>

<script>
const { DateTime } = luxon;

/* Paleta */
const C = {
  mes:'#6b46c1', prep:'#c05621', fiesta:'#276749', fiestaFin:'#22543d',
  shabbat:'#718096', omer:'#553c9a', shavuot:'#1a56db',
  teruah:'#0694a2', kippur:'#c53030', shemini:'#805ad5'
};

const LEGEND = [
  {color:C.mes,    label:'Inicio mes hebreo'},
  {color:C.prep,   label:'14 Aviv - Preparacion'},
  {color:C.fiesta, label:'Jag HaMatzot / Sucot'},
  {color:C.shabbat,label:'Shabbat en la fiesta'},
  {color:C.omer,   label:'Omer Reshit'},
  {color:C.shavuot,label:'Shavuot'},
  {color:C.teruah, label:'Yom Teruah'},
  {color:C.kippur, label:'Yom Kippur'},
  {color:C.shemini,label:'Shemini Atzeret'},
];

const MESES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_HEB = ['Aviv','Ziv','Sivan','Tamuz','Av','Elul',
                   'Etanim','Bul','Mes 9','Mes 10','Mes 11','Mes 12','Mes 13'];

/* DOM */
const $ = id => document.getElementById(id);
const yearNameInput       = $('yearName');
const timezoneInput       = $('timezone');
const latitudeInput       = $('latitude');
const longitudeInput      = $('longitude');
const elevationInput      = $('elevation');
const searchStartInput    = $('searchStart');
const crescentModeInput   = $('crescentMode');
const fallbackMonth7Input = $('fallbackMonth7');
const useFallbackMonth7Input = $('useFallbackMonth7');
const monthCountInput     = $('monthCount');
const recalcBtn           = $('recalcBtn');
const statusBox           = $('statusBox');
const placeholder         = $('placeholder');
const calOutput           = $('calOutput');
const legendEl            = $('legend');
const monthsGrid          = $('monthsGrid');

/* Helpers fecha */
const tz = () => timezoneInput.value.trim() || 'UTC';

function parseDT(v) {
  const dt = DateTime.fromISO(v, { zone: tz() });
  if (!dt.isValid) throw new Error('Fecha invalida.');
  return dt.toJSDate();
}
function addDays(d, n) {
  return DateTime.fromJSDate(d, { zone:'utc' }).plus({ days:n }).toJSDate();
}
function diffDays(a, b) { return Math.round((b - a) / 86400000); }
function dateKey(d) {
  return DateTime.fromJSDate(d, { zone:'utc' }).setZone(tz()).toFormat('yyyy-MM-dd');
}
function incRange(start, n) {
  return addDays(start, n - 1);
}

/* Observer */
function buildObserver() {
  const lat = Number(latitudeInput.value),
        lon = Number(longitudeInput.value),
        el  = Number(elevationInput.value);
  if (!Number.isFinite(lat)||lat<-90||lat>90)  throw new Error('Latitud invalida.');
  if (!Number.isFinite(lon)||lon<-180||lon>180) throw new Error('Longitud invalida.');
  if (!Number.isFinite(el))                     throw new Error('Elevacion invalida.');
  return new Astronomy.Observer(lat, lon, el);
}

/* Astronomia */
function getSunset(date, obs) {
  const noon = DateTime.fromJSDate(date, { zone:tz() })
    .set({ hour:12, minute:0, second:0, millisecond:0 }).toUTC().toJSDate();
  const ev = Astronomy.SearchRiseSet(Astronomy.Body.Sun, obs, -1, noon, 1);
  if (!ev) throw new Error('No se pudo calcular puesta del sol.');
  return new Date(ev.date);
}
function getMoonset(after, obs) {
  const ev = Astronomy.SearchRiseSet(Astronomy.Body.Moon, obs, -1, after, 1);
  return ev ? new Date(ev.date) : null;
}
function horizAlt(date, obs) {
  const equ = Astronomy.Equator(Astronomy.Body.Moon, date, obs, true, true);
  return Astronomy.Horizon(date, obs, equ.ra, equ.dec, 'normal').altitude;
}
function elongation(date) {
  const mv = Astronomy.GeoMoon(date);
  const sv = Astronomy.GeoVector(Astronomy.Body.Sun, date, true);
  const dot = mv.x*sv.x + mv.y*sv.y + mv.z*sv.z;
  const ml  = Math.sqrt(mv.x**2 + mv.y**2 + mv.z**2);
  const sl  = Math.sqrt(sv.x**2 + sv.y**2 + sv.z**2);
  return Math.acos(Math.max(-1, Math.min(1, dot/(ml*sl)))) * (180/Math.PI);
}
// ── Altitud del Sol en un momento dado ───────────────────────────────────────
function getSunAlt(date, obs) {
  const equ = Astronomy.Equator(Astronomy.Body.Sun, date, obs, true, true);
  return Astronomy.Horizon(date, obs, equ.ra, equ.dec, 'normal').altitude;
}

// ── Ancho del creciente W en arcominutos (Odeh 2006) ──────────────────────
function crescentWidth(date) {
  const mv    = Astronomy.GeoMoon(date);
  const distAU = Math.sqrt(mv.x**2 + mv.y**2 + mv.z**2);
  const distKm = distAU * 149597870.7;
  // Semidiámetro angular de la Luna en arcominutos
  const SD    = (1737.4 / distKm) * (180 / Math.PI) * 60;
  const illum = Astronomy.Illumination(Astronomy.Body.Moon, date).phase_fraction;
  // W = 2 × SD × fracción iluminada (ancho máximo del creciente)
  return 2 * SD * illum;
}

// ── Límite ARCV del criterio Odeh (2006) para visibilidad a ojo desnudo ───
// W en arcominutos; retorna la altitud mínima necesaria del creciente (grados)
function odehLimit(W, mode) {
  const base = -0.1018*W**3 + 0.7319*W**2 - 6.3226*W;
  if (mode === 'strict')  return base + 7.1651; // fácilmente visible
  if (mode === 'lenient') return base + 4.1872; // requiere ayuda óptica
  return                         base + 5.6579; // visible a ojo desnudo
}

// ── Evaluación del creciente (Yallop best-time + Odeh criterion) ──────────
// En vez de evaluar justo al atardecer, usamos el "mejor momento":
//   T = t_puesta + 4/9 × (t_luna_puesta − t_puesta)
// En T el cielo está bastante oscuro pero la luna todavía tiene altitud útil.
function evalCrescent(date, obs, mode) {
  const su = getSunset(date, obs);
  const ms = getMoonset(su, obs);

  // Sin luna poniente ese día → no visible
  if (!ms || ms <= su) return { visible: false, sunset: su };

  const lagMs = ms - su;
  const lagMin = lagMs / 60000;

  // Mínimo físico: la luna debe ponerse al menos 20 min después del sol
  if (lagMin < 20) return { visible: false, sunset: su };

  // Tiempo óptimo de observación (regla 4/9 de Yallop)
  const T = new Date(su.getTime() + (4 / 9) * lagMs);

  const moonAlt = horizAlt(T, obs);      // altitud de la Luna en T
  const sunAlt  = getSunAlt(T, obs);     // altitud del Sol en T (negativa)
  const ARCL    = elongation(T);         // elongación Sol-Luna (°)
  const ARCV    = moonAlt - sunAlt;      // arco de visión (°) — siempre > moonAlt
  const W       = crescentWidth(T);      // ancho del creciente (arcominutos)

  // La luna debe estar sobre el horizonte y la elongación ser físicamente posible
  if (moonAlt <= 0 || ARCL < 6.5) return { visible: false, sunset: su };

  // Criterio Odeh: ARCV >= límite calculado según W y modo
  const visible = ARCV >= odehLimit(W, mode);

  return { visible, sunset: su,
    debug: { ARCL: ARCL.toFixed(2), ARCV: ARCV.toFixed(2), W: W.toFixed(2),
             moonAlt: moonAlt.toFixed(2), sunAlt: sunAlt.toFixed(2), lagMin: lagMin.toFixed(0) }
  };
}

// ── Primer día del mes tras la luna nueva ────────────────────────────────
// Revisa hasta 4 días después de la luna nueva (normalmente 1-2 días bastan)
function findMonthStart(nm, obs, mode) {
  for (let d = 1; d <= 4; d++) {
    const r = evalCrescent(addDays(nm, d), obs, mode);
    if (r.visible) return r.sunset;
  }
  // Fallback: si no se detecta visibilidad en 4 días, usar día +2
  // (el mes anterior dura 30 días según la regla caraíta)
  return evalCrescent(addDays(nm, 2), obs, mode).sunset;
}
function findLunations(start, obs, mode, n) {
  const list = [];
  let anchor = new Date(start);
  for (let i=0; i<n; i++) {
    const ph = Astronomy.SearchMoonPhase(0, anchor, 35);
    if (!ph) throw new Error('No se encontro luna nueva.');
    const nm = new Date(ph.date);
    list.push({ newMoon:nm, start:findMonthStart(nm, obs, mode) });
    anchor = addDays(nm, 25);
  }
  return list;
}
function sabbathInFeast(date) {
  const z = tz();
  const d = new Date(date.getTime());
  const h = DateTime.fromJSDate(date,{zone:z}).hour;
  const m = DateTime.fromJSDate(date,{zone:z}).minute;
  if (DateTime.fromJSDate(d,{zone:z}).weekday===5) return d;
  while (DateTime.fromJSDate(d,{zone:z}).weekday!==6) d.setUTCDate(d.getUTCDate()+1);
  return DateTime.fromJSDate(d,{zone:z}).set({hour:h,minute:m,second:0,millisecond:0}).toUTC().toJSDate();
}

/* Mapa de eventos */
function buildEventMap(months, avivStart, m7Start) {
  const map = {};
  function mark(date, label, color) {
    const k = dateKey(date);
    if (!map[k]) map[k] = [];
    map[k].push({label, color});
  }
  function markRange(start, days, label, color, firstLabel) {
    for (let d=0; d<days; d++)
      mark(addDays(start,d), d===0&&firstLabel ? firstLabel : label, color);
  }

  // Inicio de cada mes hebreo
  months.forEach((m, i) => mark(m.start, `\u{1F319} 1 ${MESES_HEB[i]||'Mes '+(i+1)}`, C.mes));

  // Aviv
  mark(incRange(avivStart,14),   '14 Aviv Prep.',    C.prep);
  markRange(incRange(avivStart,15), 7, '\u{1F33E} Jag HaMatzot', C.fiesta, '\u{1F33E} 15 Aviv Pesaj');
  mark(incRange(avivStart,21),   '21 Aviv Cierre',   C.fiestaFin);
  const shab = sabbathInFeast(incRange(avivStart,15));
  mark(shab,                      '\u2721 Shabbat',  C.shabbat);
  const omer = addDays(shab, 1);
  mark(omer,                      '\u{1F33F} Omer Reshit', C.omer);
  mark(addDays(omer, 49),         '\u2728 Shavuot',  C.shavuot);

  // Mes 7
  if (m7Start) {
    mark(m7Start,                   '\u{1F4EF} Yom Teruah',    C.teruah);
    mark(incRange(m7Start,10),      '\u{1F56F} Yom Kippur',    C.kippur);
    markRange(incRange(m7Start,15), 7, '\u{1F33F} Sucot', C.fiesta, '\u{1F33F} 15 Sucot');
    mark(incRange(m7Start,22),      '\u{1F389} Shemini Atz.',  C.shemini);
  }
  return map;
}

/* Renderizar un mes gregoriano */
// Día de la semana puramente en UTC (evita bugs de DST/timezone con Luxon)
  // Retorna 1=Lun, 2=Mar, ..., 6=Sab, 7=Dom (ISO 8601)
  function isoWeekday(year, month, day) {
    const d = new Date(Date.UTC(year, month - 1, day));
    const w = d.getUTCDay(); // 0=Dom,1=Lun,...,6=Sab
    return w === 0 ? 7 : w;  // Dom pasa a 7
  }
  // Días en el mes sin depender del timezone
  function daysInMonth(year, month) {
    return new Date(Date.UTC(year, month, 0)).getUTCDate();
  }

  function renderMonth(year, month, eventMap) {
    // Construir lista plana de celdas: null=vacía, número=día
    const total  = daysInMonth(year, month);
    const offset = isoWeekday(year, month, 1) - 1; // 0=Lun … 6=Dom

    const cells = [];
    for (let i = 0; i < offset; i++) cells.push(null);
    for (let d = 1; d <= total; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null); // relleno final

    let html = `<div class="cal-month">
      <div class="cal-month-title">${MESES_ES[month-1]} ${year}</div>
      <table class="cal-table">
        <thead><tr>
          <th>L</th><th>M</th><th>M</th><th>J</th><th>V</th>
          <th class="sat">S</th><th class="sun">D</th>
        </tr></thead>
        <tbody>`;

    for (let i = 0; i < cells.length; i++) {
      if (i % 7 === 0) html += '<tr>';

      const day = cells[i];
      if (day === null) {
        html += '<td class="empty"></td>';
      } else {
        const k   = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const evs = eventMap[k] || [];
        const dow = isoWeekday(year, month, day);
        const tc  = dow === 6 ? ' sat-c' : dow === 7 ? ' sun-c' : '';
        const evH = evs.map(e =>
          `<span class="ev" style="background:${e.color}" title="${e.label}">${e.label}</span>`
        ).join('');
        html += `<td class="${tc}" onclick="showDayModal('${k}')" title="Ver detalle del día"><div class="dn">${day}</div>${evH}</td>`;
      }

      if (i % 7 === 6) html += '</tr>';
    }

    html += '</tbody></table></div>';
    return html;
  }

/* Rango de meses gregorianos a mostrar */
function gregRange(eventMap) {
  const keys = Object.keys(eventMap).sort();
  if (!keys.length) return [];
  // Parsear "yyyy-MM-dd" directamente, sin dependencia de timezone
  const parseKey = k => ({ year: +k.slice(0,4), month: +k.slice(5,7) });
  const f = parseKey(keys[0]);
  const l = parseKey(keys[keys.length-1]);
  const out = [];
  let y = f.year, m = f.month;
  while (y < l.year || (y === l.year && m <= l.month)) {
    out.push({year:y, month:m});
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}

/* Validar librerias */
function validateLibs() {
  if (typeof Astronomy==='undefined') throw new Error('Astronomy Engine no cargo. Verifica conexion.');
  if (typeof SunCalc==='undefined')   throw new Error('SunCalc no cargo.');
  if (typeof luxon==='undefined')     throw new Error('Luxon no cargo.');
}

function errMsg(e) {
  if (e instanceof Error) return e.message;
  if (typeof e==='string') return e;
  try { return JSON.stringify(e); } catch(_) { return String(e); }
}

/* ---- MAIN ---- */
function buildCalendar() {
  statusBox.className = '';
  recalcBtn.disabled = true;
  recalcBtn.textContent = 'Calculando...';

  setTimeout(() => {
    try {
      validateLibs();

      const start  = parseDT(searchStartInput.value);
      const obs    = buildObserver();
      const mode   = crescentModeInput.value;
      const fb7    = parseDT(fallbackMonth7Input.value);
      const count  = Number(monthCountInput.value);
      const year   = yearNameInput.value.trim();

      const luns = findLunations(start, obs, mode, count);

      const months = luns.map((item, i) => ({
        start: item.start,
        days:  i < luns.length-1 ? diffDays(item.start, luns[i+1].start) : 29
      }));
      months[months.length-1].days = 29;

      if (useFallbackMonth7Input.value==='force' && months[6]) {
        months[6].start = fb7;
        for (let i=7; i<months.length; i++)
          months[i].start = addDays(months[i-1].start, months[i-1].days);
      }

      const avivStart = months[0].start;
      const m7Start   = months[6]?.start;
      const delta     = m7Start ? diffDays(m7Start, fb7) : null;

      const evMap = buildEventMap(months, avivStart, m7Start);
      currentObs      = obs;      // guardado para uso en el modal
      currentEventMap = evMap;

      // Leyenda
      legendEl.innerHTML = LEGEND.map(l =>
        `<div class="lg-item"><div class="lg-dot" style="background:${l.color}"></div><span>${l.label}</span></div>`
      ).join('');

      // Meses
      monthsGrid.innerHTML = gregRange(evMap)
        .map(({year:y, month:m}) => renderMonth(y, m, evMap))
        .join('');

      placeholder.style.display = 'none';
      calOutput.style.display   = 'block';

      const cmp = delta===null ? '' : delta===0
        ? ' \u00b7 Mes 7 coincide con ancla.'
        : ` \u00b7 Mes 7 difiere ${delta} dia(s) del ancla.`;
      statusBox.className = (delta===null||Math.abs(delta)<=1) ? 'ok' : 'warn';
      statusBox.innerHTML = `<b>\u2713 Calendario ${year} generado.</b>${cmp}`;

    } catch(err) {
      placeholder.style.display = 'block';
      calOutput.style.display   = 'none';
      statusBox.className = 'error';
      statusBox.innerHTML = `<b>Error:</b> ${errMsg(err)}`;
    } finally {
      recalcBtn.disabled    = false;
      recalcBtn.textContent = 'Calcular calendario';
    }
  }, 30);
}

recalcBtn.addEventListener('click', buildCalendar);

/* ═══ MODAL: info del día ═══════════════════════════════════════════════════ */
let currentObs       = null;   // observer activo tras el último cálculo
let currentEventMap  = {};     // mapa de eventos activo

/* Fase lunar: retorna emoji, nombre y % iluminación */
function moonPhaseData(date) {
  const illumNow  = Astronomy.Illumination(Astronomy.Body.Moon, date).phase_fraction;
  const illumNext = Astronomy.Illumination(Astronomy.Body.Moon,
                      new Date(date.getTime() + 3600000)).phase_fraction;
  const waxing    = illumNext >= illumNow;
  const pct       = (illumNow * 100).toFixed(1);
  const ph        = Astronomy.Illumination(Astronomy.Body.Moon, date).phase_angle; // 0-180
  const angle     = waxing ? ph : 360 - ph; // 0-360

  let emoji, name;
  if      (angle <  15 || angle >= 345) { emoji='🌑'; name='Luna nueva';          }
  else if (angle <  75)                  { emoji='🌒'; name='Creciente joven';     }
  else if (angle < 105)                  { emoji='🌓'; name='Cuarto creciente';    }
  else if (angle < 165)                  { emoji='🌔'; name='Gibosa creciente';    }
  else if (angle < 195)                  { emoji='🌕'; name='Luna llena';          }
  else if (angle < 255)                  { emoji='🌖'; name='Gibosa menguante';    }
  else if (angle < 285)                  { emoji='🌗'; name='Cuarto menguante';    }
  else                                   { emoji='🌘'; name='Creciente menguante'; }

  return { emoji, name, pct, waxing };
}

/* Formatea un Date en la zona horaria configurada */
function fmtFull(date) {
  const z = tz();
  return DateTime.fromJSDate(date, {zone:'utc'}).setZone(z)
    .toFormat("cccc d 'de' LLLL, HH:mm 'h'");
}

function closeModal() {
  document.getElementById('dayModal').style.display = 'none';
}

function showDayModal(dateStr) {
  if (!currentObs) return;

  const modal = document.getElementById('dayModal');
  const body  = document.getElementById('modalBody');

  // Mostrar modal con loading
  modal.style.display = 'flex';
  body.innerHTML = '<div class="modal-loading">Calculando atardeceres…</div>';

  const [year, month, day] = dateStr.split('-').map(Number);

  // Título gregoriano
  const z = tz();
  const dtLabel = DateTime.fromObject({year, month, day}, {zone: z})
    .toFormat("cccc, d 'de' LLLL yyyy");
  document.getElementById('modalTitleText').textContent = dtLabel;

  // Eventos del día
  const evs = currentEventMap[dateStr] || [];
  document.getElementById('modalEvents').innerHTML = evs.length
    ? evs.map(e => `<span class="modal-ev" style="background:${e.color}">${e.label}</span>`).join('')
    : '<span style="color:#aaa;font-size:.8rem">Sin eventos especiales</span>';

  // Cálculo asíncrono (setTimeout para no bloquear UI)
  setTimeout(() => {
    try {
      // Fechas UTC para getSunset: día anterior (= inicio del día hebreo) y este día (= fin)
      const prevUTC = new Date(Date.UTC(year, month - 1, day - 1, 12, 0, 0));
      const thisUTC = new Date(Date.UTC(year, month - 1, day,     12, 0, 0));

      const sunsetStart = getSunset(prevUTC, currentObs); // inicia el día hebreo
      const sunsetEnd   = getSunset(thisUTC, currentObs); // termina el día hebreo

      // Duración del día hebreo
      const durMs  = sunsetEnd - sunsetStart;
      const durH   = Math.floor(durMs / 3600000);
      const durMin = Math.floor((durMs % 3600000) / 60000);

      // Fase lunar al inicio del día hebreo (al atardecer anterior)
      const phase = moonPhaseData(sunsetStart);

      body.innerHTML = `
        <div class="modal-time-row">
          <div class="modal-icon">🌅</div>
          <div>
            <div class="modal-lbl">Inicio del día hebreo</div>
            <div class="modal-time">${fmtFull(sunsetStart)}</div>
          </div>
        </div>
        <div class="modal-time-row">
          <div class="modal-icon">🌇</div>
          <div>
            <div class="modal-lbl">Fin del día hebreo</div>
            <div class="modal-time">${fmtFull(sunsetEnd)}</div>
          </div>
        </div>
        <div class="modal-phase-bar">
          <div class="phase-emoji">${phase.emoji}</div>
          <div class="phase-info">
            <div class="phase-name">${phase.name}</div>
            <div class="phase-detail">
              ${phase.pct}% iluminada · ${phase.waxing ? 'Creciente' : 'Menguante'}
            </div>
          </div>
        </div>
        <div class="modal-duration">⏱ Duración del día hebreo: ${durH}h ${durMin}min</div>
      `;
    } catch(e) {
      body.innerHTML = `<div class="modal-loading" style="color:#c53030">Error: ${e.message||e}</div>`;
    }
  }, 20);
}
</script>
