<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Inicio</title>
  <link rel="stylesheet" href="assets/css/master.css">
</head>
<body>
  <div class="app home-app">
    <section class="scanner-stage">
       <video class="scanner-video" id="scanner-video" autoplay playsinline muted></video>
      <div class="scanner-overlay"></div>
      <div class="statusbar">
        <div>8:45</div>
        <div>52% 🔋</div>
      </div>

      <div class="scan-corners">
        <span class="tl"></span>
        <span class="tr"></span>
        <span class="bl"></span>
        <span class="br"></span>
      </div>

      <div class="scan-center">
        <div class="inner"></div>
      </div>

       <button class="scan-side left scanner-control" id="upload-trigger" type="button" title="Leer código desde una imagen">🖼️</button>
      <button class="scan-side right scanner-control" id="torch-trigger" type="button" title="Encender o apagar linterna">🔦</button>
      <input id="image-input" type="file" accept="image/*" capture="environment" hidden>
    </section>

    <section class="home-sheet">
      <div class="off-card">
        <div class="off-logo">
          <img src="assets/img/logo.svg" alt="Open Food Facts">
        </div>
        <p class="off-title"><strong>Escanee</strong> un código de barras o <strong>busque</strong> un producto</p>
          <form class="search-pill" id="barcode-form">
          <label class="search-left" for="barcode-input">#</label>
          <input
            id="barcode-input"
            class="search-input"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            maxlength="14"
            pattern="[0-9]{8,14}"
            placeholder="Buscar por código de barras"
            aria-label="Código de barras"
          >
          <button class="search-btn" type="submit">⌕</button>
        </form>
 <p class="search-help" id="scanner-help">Activa la cámara para escanear en vivo, usa una foto o escribe el código manualmente.</p>
        <div class="scanner-status" id="scanner-status">Inicializando cámara…</div>
              </div>

      <div class="help-card">
        <div class="help-top">● ¡Nuestra aplicación te necesita!</div>
        <div class="help-body">
          <div class="help-icon">🤝</div>
          <div>
            <p class="help-text">¡Ayúdanos a informar a <strong>millones de consumidores</strong> sobre lo que comen!</p>
            <div class="help-actions">
              <button class="help-btn" type="button">Apoyar →</button>
                          </div>
          </div>
        </div>
      </div>
      <div class="home-safe"></div>
    </section>

    <nav class="bottom-nav">
      <button class="item" type="button">
              <div class="icon-wrap">👤</div>
        <div>Community</div>
      </button>
      <button class="item active" type="button">
        <div class="icon-wrap">⌕</div>
        <div>Escanear</div>
      </button>
      <button class="item" type="button">
        <div class="icon-wrap">☰</div>
        <div>Listas</div>
      </button>
    </nav>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <script>
    const BARCODE_PATTERN = /^\d{8,14}$/;
    const SCAN_REGION = { top: '28%', right: '10%', left: '10%', bottom: '28%' };
    const form = document.getElementById('barcode-form');
    const input = document.getElementById('barcode-input');
    const scannerStatus = document.getElementById('scanner-status');
    const scannerHelp = document.getElementById('scanner-help');
    const video = document.getElementById('scanner-video');
    const uploadTrigger = document.getElementById('upload-trigger');
    const torchTrigger = document.getElementById('torch-trigger');
    const imageInput = document.getElementById('image-input');

    let videoStream = null;
    let detector = null;
    let scanning = false;
    let lastDetectedCode = '';
    let torchEnabled = false;
    let supportsTorch = false;
    let scanFailureCount = 0;
    let quaggaReady = false;
    let quaggaActive = false;

    function setScannerStatus(message, tone = 'neutral') {
      scannerStatus.textContent = message;
      scannerStatus.dataset.tone = tone;
    }

function normalizeBarcode(value) {
      return String(value || '').replace(/\D/g, '');
    }

    function isValidBarcode(value) {
      return BARCODE_PATTERN.test(normalizeBarcode(value));
    }

    function updateHelpMessage(message) {
      scannerHelp.textContent = message;
    }
    function goToResult(barcode) {
const cleanCode = normalizeBarcode(barcode);
      if (!isValidBarcode(cleanCode)) {
        setScannerStatus('El código debe contener entre 8 y 14 dígitos numéricos.', 'warning');
              if (!cleanCode) {
        return;
      }

      lastDetectedCode = cleanCode;
      setScannerStatus(`Código detectado: ${cleanCode}. Consultando producto…`, 'success');
      window.location.href = `resultado.html?barcode=${encodeURIComponent(cleanCode)}`;
    }

    async function detectFromCanvas(canvas) {
      if (!detector) {
        throw new Error('El navegador no soporta BarcodeDetector.');
      }

      const barcodes = await detector.detect(canvas);
      const detectedCode = barcodes.find((item) => isValidBarcode(item.rawValue || ''))?.rawValue;
      if (!detectedCode) {
        throw new Error('No se encontró un código de barras válido en la imagen.');
      }

 return normalizeBarcode(detectedCode);
    }

    function handleSuccessfulDetection(rawCode, sourceLabel = 'cámara') {
      const detectedCode = normalizeBarcode(rawCode);
      if (!isValidBarcode(detectedCode) || detectedCode === lastDetectedCode) {
        return;
      }

      setScannerStatus(`Código leído desde ${sourceLabel}: ${detectedCode}.`, 'success');
      goToResult(detectedCode);
          }

    async function scanLoop() {
      if (!scanning || !detector || video.readyState < 2 || quaggaActive) {
              requestAnimationFrame(scanLoop);
        return;
      }

      try {
        const barcodes = await detector.detect(video);
const detectedCode = barcodes.find((item) => isValidBarcode(item.rawValue || ''))?.rawValue;

        if (detectedCode) {
          scanFailureCount = 0;
          handleSuccessfulDetection(detectedCode);
          return;
        }
         scanFailureCount += 1;
        if (scanFailureCount % 45 === 0) {
          setScannerStatus('Alinea el código dentro del recuadro, evita reflejos y acerca un poco más la cámara.', 'neutral');
        }
      } catch (error) {
        scanFailureCount += 1;
        if (scanFailureCount % 30 === 0) {
          setScannerStatus('No se pudo leer este fotograma. Intenta con mejor iluminación o más enfoque.', 'warning');
        }
      }

      requestAnimationFrame(scanLoop);
    }
async function initQuaggaScanner() {
      if (!window.Quagga || quaggaReady) {
        return;
      }

      await new Promise((resolve, reject) => {
        window.Quagga.init({
          inputStream: {
            type: 'LiveStream',
            target: video,
            constraints: {
              facingMode: 'environment',
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            area: SCAN_REGION
          },
          locator: {
            patchSize: 'medium',
            halfSample: true
          },
          numOfWorkers: navigator.hardwareConcurrency ? Math.max(1, Math.min(4, navigator.hardwareConcurrency - 1)) : 2,
          frequency: 10,
          decoder: {
            readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader']
          },
          locate: true
        }, (error) => {
          if (error) {
            reject(error);
            return;
          }

          quaggaReady = true;
          resolve();
        });
      });

      window.Quagga.offDetected(handleQuaggaDetected);
      window.Quagga.onDetected(handleQuaggaDetected);
    }

    function handleQuaggaDetected(result) {
      const code = result?.codeResult?.code;
      if (isValidBarcode(code)) {
        handleSuccessfulDetection(code, 'cámara');
      }
    }

    async function startScannerWithQuagga() {
      if (!window.Quagga) {
        updateHelpMessage('Tu navegador no soporta lectura automática nativa y no se pudo cargar el lector alternativo. Ingresa el código manualmente.');
        setScannerStatus('Escáner alternativo no disponible; sigue activa la búsqueda manual.', 'warning');
        return;
      }

      try {
        await initQuaggaScanner();
        window.Quagga.start();
        quaggaActive = true;
        scanning = true;
        torchTrigger.disabled = true;
        torchTrigger.title = 'La linterna no está disponible con el lector alternativo';
        updateHelpMessage('Lector alternativo activo. Centra el código, evita reflejos y mantén el teléfono estable.');
        setScannerStatus('Escáner alternativo activo. Apunta el código dentro del recuadro.', 'success');
      } catch (error) {
        updateHelpMessage('No se pudo iniciar el lector automático. Ingresa el código manualmente o prueba con otra foto.');
        setScannerStatus(`No se pudo iniciar el lector alternativo: ${error.message}`, 'warning');
      }
    }

    async function startScanner() {
      if (!('mediaDevices' in navigator) || !navigator.mediaDevices.getUserMedia) {
        updateHelpMessage('Tu navegador no permite acceso a la cámara. Usa una foto o escribe el código manualmente.');
                setScannerStatus('Cámara no disponible en este navegador.', 'warning');
        return;
      }

      if (!('BarcodeDetector' in window)) {
        updateHelpMessage('Tu navegador no soporta escaneo nativo; se intentará usar un lector alternativo.');
        await startScannerWithQuagga();
        return;
      }

      try {
        detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'] });
        videoStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        video.srcObject = videoStream;
        await video.play();

        const [track] = videoStream.getVideoTracks();
        const capabilities = track?.getCapabilities?.() || {};
        supportsTorch = Boolean(capabilities.torch);
        torchTrigger.disabled = !supportsTorch;

        if (!supportsTorch) {
          torchTrigger.title = 'La linterna no está disponible en este dispositivo';
        }

        scanning = true;
        updateHelpMessage('Cámara activa. Alinea el código dentro del recuadro y evita reflejos para una lectura más estable.');
        setScannerStatus('Cámara activa. Apunta el código dentro del recuadro para consultar el producto real.', 'success');
        requestAnimationFrame(scanLoop);
      } catch (error) {
        updateHelpMessage('No se pudo abrir la cámara nativa. Se intentará un lector alternativo; si falla, escribe el código manualmente.');
        setScannerStatus(`No se pudo iniciar la cámara nativa: ${error.message}`, 'warning');
        await startScannerWithQuagga();
      }
    }

    async function toggleTorch() {
      if (!videoStream || !supportsTorch) {
        setScannerStatus('La linterna no está disponible en este dispositivo.', 'warning');
        return;
      }

      const [track] = videoStream.getVideoTracks();
      torchEnabled = !torchEnabled;

      try {
        await track.applyConstraints({ advanced: [{ torch: torchEnabled }] });
        setScannerStatus(torchEnabled ? 'Linterna activada.' : 'Linterna desactivada.', 'success');
      } catch (error) {
        torchEnabled = !torchEnabled;
        setScannerStatus('No fue posible cambiar el estado de la linterna.', 'warning');
      }
    }

    async function handleImageSelection(event) {
      const [file] = event.target.files || [];
      if (!file) {
        return;
      }

      if (!('BarcodeDetector' in window)) {
        setScannerStatus('Este navegador no permite analizar imágenes automáticamente. Ingresa el código manualmente.', 'warning');
                event.target.value = '';
        return;
      }

      try {
        detector = detector || new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'] });
        const bitmap = await createImageBitmap(file);
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const context = canvas.getContext('2d');
        context.drawImage(bitmap, 0, 0);
        const detectedCode = await detectFromCanvas(canvas);
        goToResult(detectedCode);
        handleSuccessfulDetection(detectedCode, 'imagen');
      } catch (error) {
        setScannerStatus(error.message || 'No se pudo analizar la imagen seleccionada.', 'warning');
      } finally {
        event.target.value = '';
      }
    }
    input.addEventListener('input', () => {
      const normalized = normalizeBarcode(input.value).slice(0, 14);
      if (input.value !== normalized) {
        input.value = normalized;
      }
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const barcode = normalizeBarcode(input.value);

      if (!isValidBarcode(barcode)) {
              input.focus();
setScannerStatus('Escribe un código válido de 8 a 14 dígitos o escanéalo con la cámara.', 'warning');
        return;
      }

 goToResult(barcode);
     });

    uploadTrigger.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', handleImageSelection);
    torchTrigger.addEventListener('click', toggleTorch);
    window.addEventListener('beforeunload', () => {
      videoStream?.getTracks?.().forEach((track) => track.stop());
      if (window.Quagga && quaggaActive) {
        window.Quagga.stop();
      }
    });

    startScanner();
  </script>
</body>
</html>
