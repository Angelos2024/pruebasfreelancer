<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Productos Amber - Inicio</title>
  <style>
    :root {
      --bg: #e2e8f0;
      --panel: #f8fafc;
      --card: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;
      --success-bg: #ecfdf5;
      --success-text: #047857;
      --success-line: #a7f3d0;
      --warning-bg: #fffbeb;
      --warning-text: #b45309;
      --warning-line: #fde68a;
      --info-bg: #eff6ff;
      --info-text: #1d4ed8;
      --info-line: #bfdbfe;
      --radius-xl: 28px;
      --shadow-soft: 0 6px 16px rgba(15, 23, 42, 0.05);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea { font: inherit; }
    .phone-shell {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--panel);
      position: relative;
      overflow-x: hidden;
    }
    .topbar {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 16px 16px 14px;
    }
    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .app-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      white-space: nowrap;
    }
    .chip.info { background: var(--info-bg); color: var(--info-text); border-color: var(--info-line); }
    .chip.success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-line); }
    .chip.warning { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-line); }
    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mode-btn, .action-btn, .quick-card, .link-action, .fab {
      transition: transform .15s ease, background .15s ease, color .15s ease;
    }
    .mode-btn:active, .action-btn:active, .quick-card:active, .link-action:active, .fab:active {
      transform: scale(0.985);
    }
    .mode-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 18px;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .mode-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .content {
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .field, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--text);
      border-radius: 18px;
      padding: 15px 16px;
      outline: none;
    }
    .field { min-height: 54px; }
    .textarea { min-height: 116px; resize: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stack { display: grid; gap: 10px; }
    .action-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      padding: 13px 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }
    .action-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .quick-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 20px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
    }
    .quick-icon { font-size: 24px; line-height: 1; margin-bottom: 8px; }
    .quick-label { font-size: 12px; font-weight: 700; line-height: 1.2; color: var(--muted); }
    .result-card { padding: 0; overflow: hidden; }
    .result-head {
      padding: 16px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .result-label { margin: 0 0 5px; font-size: 12px; color: var(--muted); }
    .result-title { margin: 0; font-size: 19px; line-height: 1.15; font-weight: 800; letter-spacing: -0.03em; }
    .result-body { padding: 16px; display: grid; gap: 14px; }
    .product-image {
      border-radius: 24px;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .body-text { margin: 0; font-size: 14px; line-height: 1.7; color: var(--muted); }
    .subcard {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 20px;
      padding: 14px;
    }
    .sub-label { margin: 0 0 6px; font-size: 12px; color: var(--muted); }
    .sub-value { margin: 0; font-size: 14px; line-height: 1.7; color: #334155; }
    .list { display: grid; gap: 10px; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 18px;
      padding: 12px 14px;
    }
    .history-title { margin: 0 0 4px; font-size: 14px; font-weight: 700; color: var(--text); }
    .history-meta { margin: 0; font-size: 12px; color: var(--muted); }
    .link-action {
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .fab {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 28px;
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.22);
      cursor: pointer;
    }
</style>
</head>
<body>
  <div class="phone-shell">

    <header class="topbar">
      <div class="topbar-row">
        <div>
          <p class="eyebrow">Android UI</p>
          <h1 class="app-title">Productos Amber</h1>
        </div>
        <span class="chip info">Demo</span>
      </div>
      <div class="mode-switch">
        <button class="mode-btn active">Tahor / Tame</button>
        <button class="mode-btn">Matzah</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Consulta rápida</h2>
          <span class="chip">Principal</span>
        </div>
        <div class="stack">
          <input class="field" type="text" placeholder="Nombre, marca o código" />
          <div class="grid-2">
            <button class="action-btn primary">Buscar</button>
            <button class="action-btn">Escanear</button>
          </div>
          <div class="grid-2">
            <button class="action-btn">Subir ingredientes</button>
            <button class="action-btn">Filtros</button>
          </div>
        </div>
      </section>
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Acciones rápidas</h2>
        </div>
        <div class="grid-3">
          <button class="quick-card"><div class="quick-icon">📷</div><div class="quick-label">Escanear</div></button>
          <button class="quick-card"><div class="quick-icon">📝</div><div class="quick-label">Registrar</div></button>
          <button class="quick-card"><div class="quick-icon">📂</div><div class="quick-label">Pendientes</div></button>
        </div>
      </section>
    </main>

  </div>
</body>
</html>
