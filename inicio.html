<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Inicio</title>
  <link rel="stylesheet" href="assets/css/master.css">
</head>
<body>
  <div class="app home-app">
    <section class="scanner-stage">
      <div class="statusbar">
        <div>8:45</div>
        <div>52% 🔋</div>
      </div>

      <div class="scan-corners">
        <span class="tl"></span>
        <span class="tr"></span>
        <span class="bl"></span>
        <span class="br"></span>
      </div>

      <div class="scan-center">
        <div class="inner"></div>
      </div>

      <div class="scan-side left">🖼️</div>
      <div class="scan-side right">🔦</div>
    </section>

    <section class="home-sheet">
      <div class="off-card">
        <div class="off-logo">
          <img src="assets/img/logo.svg" alt="Open Food Facts">
        </div>
        <p class="off-title"><strong>Escanee</strong> un código de barras o <strong>busque</strong> un producto</p>
        <div class="search-pill">
          <div class="search-left">📸</div>
          <div class="search-placeholder">Buscar un producto</div>
          <button class="search-btn">⌕</button>
        </div>
      </div>

      <div class="help-card">
        <div class="help-top">● ¡Nuestra aplicación te necesita!</div>
        <div class="help-body">
          <div class="help-icon">🤝</div>
          <div>
            <p class="help-text">¡Ayúdanos a informar a <strong>millones de consumidores</strong> sobre lo que comen!</p>
            <div class="help-actions">
              <button class="help-btn">Apoyar →</button>
            </div>
          </div>
        </div>
      </div>
      <div class="home-safe"></div>
    </section>

    <nav class="bottom-nav">
      <button class="item">
        <div class="icon-wrap">👤</div>
        <div>Community</div>
      </button>
      <button class="item active">
        <div class="icon-wrap">⌕</div>
        <div>Escanear</div>
      </button>
      <button class="item">
        <div class="icon-wrap">☰</div>
        <div>Listas</div>
      </button>
    </nav>
  </div>
</body>
</html>
